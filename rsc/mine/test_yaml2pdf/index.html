    // Function to parse YAML-like string
    function parseYAML(yamlString) {
        const lines = yamlString.trim().split('\n');
        const data = {};
        let currentKey = '';
        let currentArray = null;

        for (let line of lines) {
            line = line.trim();
            if (line === '---') continue;
            
            if (line.includes(':')) {
                const [key, value] = line.split(':').map(s => s.trim());
                if (value) {
                    data[key] = value.replace(/^"(.*)"$/, '$1');
                } else {
                    currentKey = key;
                    data[currentKey] = [];
                    currentArray = data[currentKey];
                }
            } else if (line.startsWith('-') && currentArray) {
                currentArray.push(line.slice(1).trim());
            } else if (currentKey && line) {
                data[currentKey] += ' ' + line;
            }
        }
        return data;
    }

    // Parse the YAML data
    const data = parseYAML(resumeData);

    // Function to generate HTML
    function generateHTML(data) {
        return `

            <h2>Work Experience</h2>
            ${data.jobs.map(job => `

                    <div class="job-header">${job.jobtitle}</div>
                    <div>${job.company}</div>
                    <div class="job-date">${job.startdate} - ${job.enddate}</div>
                    <ul>
                        ${job.items.map(item => `<li>${item}</li>`).join('')}
                    </ul>
                </div>
            `).join('')}

            <h2>Education</h2>
            ${data.education.map(edu => `
                <div>${edu.degree}</div>
                <div>${edu.institution}</div>
            `).join('')}

            <h2>Awards</h2>
            <ul>
                ${data.awards.map(award => `<li>${award}</li>`).join('')}
            </ul>

            <h2>Tools & Technologies</h2>
            <p>${data.tools}</p>
        </div>

        <button id="exportBtn">Export as PDF</button>
        `;
    }

    // Generate and set the HTML content
    document.body.innerHTML = generateHTML(data);

    // Add styles
    const style = document.createElement('style');
    style.textContent = `
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            color: #333;

        }

        }

            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            margin-top: 20px;
        }
        .job {
            margin-bottom: 20px;
        }
        .job-header {
            font-weight: bold;
        }
        .job-date {
            font-style: italic;
        }
        ul {

            padding-left: 20px;
        }
        #exportBtn {
            display: block;
            margin: 20px auto;

            background-color: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
    `;
    document.head.appendChild(style);

    // Add PDF export functionality
    document.getElementById('exportBtn').addEventListener('click', function() {
        const element = document.getElementById('resume-content');
        const opt = {
            margin: 10,
            filename: 'charles_karpati_resume.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    });
    </script>
